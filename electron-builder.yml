# electron-builder configuration. Run via `npm run package:win` (etc.),
# which first does `electron-vite build` to produce out/{main,preload,
# renderer}, then packages that into an installer.
appId: com.verlox.app
productName: Verlox
copyright: Copyright © 2026 Verlox

# Where auto-update files (installer + latest.yml) are published and
# where the installed app checks for new versions. FILL IN owner/repo
# once you create the GitHub repo for the desktop app, then publish a
# release with:  npm run package:win -- --publish always   (with a
# GH_TOKEN env var that has repo write access).
publish:
  provider: github
  owner: TylerES777
  repo: Verlox
  # Publish a real release, not a draft (electron-builder's default), so the
  # auto-updater (which only sees non-draft "latest") picks it up immediately.
  releaseType: release

directories:
  # Installer + unpacked app land here.
  output: dist
  # electron-builder auto-picks up build/icon.ico (Windows) and
  # build/icon.png (mac/linux) from here. Generate them first with
  # `npm run make-icons`.
  buildResources: build

# What goes inside the app. electron-vite emits to out/; we ship that
# plus package.json. Production node_modules (electron-store) are
# included automatically from "dependencies".
files:
  - out/**/*
  - package.json

# Pack the app source into an asar archive (default, but explicit).
# userData (token, settings) lives outside the asar, so this is safe.
asar: true

# node-pty here is @homebridge/node-pty-prebuilt-multiarch, which ships
# prebuilt binaries for Node AND Electron and picks the right one at runtime
# (this is why dev works without a compile step). So skip electron-builder's
# native rebuild — it would invoke node-gyp, which fails outright on a project
# path containing a space ("Vorlox v2").
npmRebuild: false

win:
  target:
    - nsis
  icon: build/icon.ico

# NSIS installer behaviour — a normal "choose where to install" wizard
# rather than a silent one-click, so it reads as a real desktop app
# install. Users get desktop + Start Menu shortcuts and an uninstaller.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Verlox
  # Stable, version-less installer name so the landing page can link
  # directly to the file via GitHub's /releases/latest/download/ path
  # (which always 404s if the filename carries a version that changes).
  # electron-updater still works fine: latest.yml records this name.
  artifactName: ${productName}-Setup.${ext}

mac:
  target:
    - dmg
  icon: build/icon.png
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Development
