name: Release

# Build + publish the Windows desktop app to GitHub Releases.
#
# Why CI: the Windows runner has the MSVC C++ toolchain (so node-pty compiles
# for the Electron ABI) and a space-free checkout path — neither of which the
# local dev machine has. Triggers on a version tag (v*), e.g.:
#   npm version patch && git push --follow-tags
# electron-builder publishes a real release (releaseType: release) using the
# auto-provided GITHUB_TOKEN, so the auto-updater picks it up.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build, package, and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package:win -- --publish always
