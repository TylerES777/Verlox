<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Verlox mark">
  <!-- Standalone glyph for light backgrounds: ink chevron + live pip,
       transparent background. Use anywhere the squircle would be too
       heavy (favicon at large sizes, inline brand marks, watermarks). -->
  <defs>
    <linearGradient id="vxm-pip" x1="76" y1="50" x2="100" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5FD08F"/>
      <stop offset="1" stop-color="#1E8048"/>
    </linearGradient>
  </defs>
  <path d="M40 36 L66 64 L40 92" stroke="#15161A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="88" cy="64" r="11" fill="url(#vxm-pip)"/>
</svg>
